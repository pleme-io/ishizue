name: auto-release

# Three-line consumer shim. Every push to main runs the pleme-io
# substrate polymorphic auto-release pipeline (detect-repo-type →
# bump → commit → tag → push → publish). Authored once at the
# substrate; consumer footprint stays minimal.
#
# Architecture: https://github.com/pleme-io/substrate/blob/main/docs/AUTO-RELEASE.md

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump-type:
        description: "patch | minor | major"
        required: false
        default: patch

jobs:
  release:
    uses: pleme-io/substrate/.github/workflows/auto-release.yml@main
    with:
      bump-type: ${{ inputs.bump-type || 'patch' }}
    secrets: inherit
